# ============================================================================
# Nav2 参数 — MuJoCo X1 仿真 (FastLIO2 + 3D VoxelLayer + MPPI)
# ============================================================================
# 传感器: /cloud_registered_body (FastLIO2, PointCloud2, body系)
# TF 链: map -> odom -> base_footprint -> base_link
#   - map -> odom: 静态 TF (tf_bridge.launch.py)
#   - odom -> base_footprint: odom_bridge.py (FastLIO2 /Odometry 转换)
#   - base_footprint -> base_link: 静态 TF (Z=0.86m, tf_bridge.launch.py)
# 里程计: odom_bridge.py 发布 /odom (含速度, 从 FastLIO2 /Odometry 透传)
# 全局地图: lab_env_map.yaml (从 lab_env.xml 自动生成)
# 坐标系: odom 系地面 Z=0, base_link Z≈0.86m, 墙壁 Z=0~2.8m
# 控制器: 纯 MPPI (无 RotationShim, 人形不适合硬原地旋转)
# ============================================================================

# --- AMCL (阶段5启用, 当前由 tf_bridge 静态 map->odom 代替) ---
amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan"               # 阶段5: pc2scan 输出
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    tf_broadcast: False
    # set_initial_pose: true            # 极其重要：启动即赋初值，防止由于等待位姿导致 TF 断裂
    # initial_pose: [0.0, 0.0, 0.0, 0.0] # 初始位姿 (x, y, z, yaw) 根据仿真起始点修改

# --- 行为树导航器 ---
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

# --- 控制器服务器 (MPPI) ---
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0          # 20→10: 低RTF下降低控制频率，给MPPI更多计算时间
    # cmd_vel 由 Nav2 默认发到 /cmd_vel, odom_bridge.py relay 转发到 /cmd_vel_limiter
    # 不在此设置 cmd_vel_topic, 避免与 relay 冲突产生双写
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    odom_topic: /odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.35
      stateful: True

    # ---- MPPI 控制器 (直接使用, 无 RotationShim) ----
    # RotationShimController 对人形机器人做硬原地旋转, RL 步态策略无法处理
    # 纯角速度 (vx=0, wz=0.4) → 步态变形 → 摔倒
    # MPPI 通过轨迹采样自然产生弧线转弯, 对人形更安全
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 16
      model_dt: 0.1
      batch_size: 200
      vx_std: 0.2
      vy_std: 0.0
      wz_std: 0.4
      vx_max: 0.3
      vx_min: -0.1
      vy_max: 0.0
      wz_max: 0.4
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 1.0
      temperature: 0.5
      gamma: 0.015
      motion_model: "DiffDrive"

      # 加速度限制
      ax_max: 2.0
      ax_min: -2.0
      az_max: 2.0

      visualize: true

      # 评分标准
      critics: [
        "ConstraintCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PreferForwardCritic",
        "CostCritic"
      ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        cost_power: 1
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_weight: 14.0
        cost_power: 1
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PreferForwardCritic:
        enabled: true
        cost_weight: 4.0             # 2.0→4.0: 无 Shim, 恢复正向偏好
        cost_power: 1
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        critical_cost: 300.0
        collision_cost: 1000000.0
        consider_footprint: false
        near_goal_distance: 0.5

# ==================== 局部代价地图 ====================
# VoxelLayer 直接消费 FastLIO2 3D 点云, 保留高度信息
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.15             # 0.2→0.15: X1 宽约0.3m, 留通道A通行空间
      transform_tolerance: 0.5   # 允许TF时间戳偏差，防止点云被丢弃

      plugins: ["voxel_layer", "denoise_layer", "inflation_layer"]

      # 3D 体素层: 订阅 FastLIO2 去畸变体系点云
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True        # 调试时开启, RViz 中可看 3D 体素
        origin_z: -0.2                 # odom 系中地面 Z≈0，从 -0.2 开始覆盖
        z_resolution: 0.1
        z_voxels: 30                   # 30层×0.1m=3.0m，覆盖[-0.2m, 2.8m]全高度
        max_obstacle_height: 2.5       # 保留墙壁全高 (地面0m→天花板2.8m)
        min_obstacle_height: 0.05      # 排除地面噪声 (Z<0.05m 的点丢弃)
        mark_threshold: 2              # # 体素列中至少 2 个点才标记障碍（单个散射噪点不再触发）
        unknown_threshold: 15
        combination_method: 1          # 1=overwrite, 每次更新直接覆盖而非累积
        # 标记和清除分离：防止盲区内 raytrace 清除已标记的近距离障碍体素
        # cloud_mark : 仅标记，从 0.3m 起（Mid360 物理盲区边界）
        # cloud_clear: 仅清除，从 0.8m 起（机器人贴近障碍时不清除体素，防止"遗忘"）
        observation_sources: cloud_mark cloud_clear
        cloud_mark:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 2.5
          min_obstacle_height: 0.05
          clearing: False
          marking: True
          obstacle_max_range: 5.0
          obstacle_min_range: 0.3
        cloud_clear:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 2.5
          min_obstacle_height: 0.05
          clearing: True
          marking: False
          raytrace_max_range: 6.0
          raytrace_min_range: 0.8     # 仅在 0.8m 以外执行清除，盲区内不清除

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 3          # 默认值
        group_connectivity_type: 8     # 默认值，推荐

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.35         # 0.7→0.35: 与全局一致, 不堵通道

# ==================== 全局代价地图 ====================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.15             # 0.2→0.15: 与局部costmap一致
      resolution: 0.05
      track_unknown_space: false
      transform_tolerance: 0.5   # 允许TF时间戳偏差，防止点云被丢弃

      plugins: ["static_layer", "inflation_layer"]  # "voxel_layer", 

      # 静态地图层 (mujoco.yaml: FAST_LIO2 建图后用 octomap/pcd2pgm 转换)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # 3D 体素层: 实时障碍物检测
      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True
      #   publish_voxel_map: False
      #   origin_z: -1.4
      #   z_resolution: 0.1
      #   z_voxels: 25   # 25层×0.1m=2.5m，覆盖[-1.4m, 1.1m]，传感器origin Z≈0.87m在界内
      #   max_obstacle_height: 0.2   # 地面(-1.25m)+1.45m障碍物
      #   min_obstacle_height: -0.9  # 地面(-1.25m)+0.25m，跳过地面噪声
      #   mark_threshold: 2
      #   unknown_threshold: 15
      #   combination_method: 1  ##
      #   observation_sources: pointcloud
      #   pointcloud:
      #     topic: /cloud_registered_body
      #     data_type: "PointCloud2"
      #     max_obstacle_height: 0.2
      #     min_obstacle_height: -0.9
      #     clearing: True
      #     marking: True
      #     obstacle_max_range: 8.0
      #     obstacle_min_range: 0.3
      #     raytrace_max_range: 10.0
      #     raytrace_min_range: 0.3

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35         # 0.55→0.35: passage A 宽0.80m, 致命区0.2m*2=0.4m, 留0.4m通道

# --- 地图服务器 ---
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "lab_env_map.yaml"  # 从 lab_env.xml 几何体自动生成

# --- 全局规划器 ---
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
