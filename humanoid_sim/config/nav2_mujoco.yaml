# ============================================================================
# Nav2 еҸӮж•° вҖ” MuJoCo X1 д»ҝзңҹ (FastLIO2 + 3D VoxelLayer + MPPI)
# ============================================================================
# дј ж„ҹеҷЁ: /cloud_registered_body (FastLIO2, PointCloud2, bodyзі»)
# TF й“ҫ: map -> odom -> base_link -> lidar_link
#   - odom->base_link : sim2sim_nav.py еҸ‘еёғ (imu site дҪҚзҪ®)
#   - base_link->lidar_link : sim2sim_nav.py йқҷжҖҒTF
#   - map->odom : FAST_LIO2 жҸҗдҫӣ (йңҖеҗҜеҠЁ fast_lio mapping иҠӮзӮ№)
# йҮҢзЁӢи®Ў: sim2sim_nav.py еҸ‘еёғ odomвҶ’base_link TF
# е…ЁеұҖең°еӣҫ: mujoco.yaml (FAST_LIO2 е»әеӣҫеҗҺиҪ¬жҚўзҡ„ 2D ж …ж јең°еӣҫ)
# еқҗж Үзі»иҜҙжҳҺ: FAST_LIO2 еҲқе§ӢеҢ– lidar еңЁ Z=0,
#   base_link(йӘЁзӣҶ) вүҲ -0.45m, ең°йқў вүҲ -1.25m (odomзі»)
# жіЁж„Ҹ: ObstacleCritic жңү bug, з”Ё CostCritic жӣҝд»Ј
# ============================================================================

# --- AMCL (йҳ¶ж®ө5еҗҜз”Ё, еҪ“еүҚз”ұ tf_bridge йқҷжҖҒ map->odom д»Јжӣҝ) ---
amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan"               # йҳ¶ж®ө5: pc2scan иҫ“еҮә
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    tf_broadcast: False
    # set_initial_pose: true            # жһҒе…¶йҮҚиҰҒпјҡеҗҜеҠЁеҚіиөӢеҲқеҖјпјҢйҳІжӯўз”ұдәҺзӯүеҫ…дҪҚе§ҝеҜјиҮҙ TF ж–ӯиЈӮ
    # initial_pose: [0.0, 0.0, 0.0, 0.0] # еҲқе§ӢдҪҚе§ҝ (x, y, z, yaw) ж №жҚ®д»ҝзңҹиө·е§ӢзӮ№дҝ®ж”№

# --- иЎҢдёәж ‘еҜјиҲӘеҷЁ ---
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

# --- жҺ§еҲ¶еҷЁжңҚеҠЎеҷЁ (MPPI) ---
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0          # 20вҶ’10: дҪҺRTFдёӢйҷҚдҪҺжҺ§еҲ¶йў‘зҺҮпјҢз»ҷMPPIжӣҙеӨҡи®Ўз®—ж—¶й—ҙ
    # cmd_vel з”ұ Nav2 й»ҳи®ӨеҸ‘еҲ° /cmd_vel, odom_bridge.py relay иҪ¬еҸ‘еҲ° /cmd_vel_limiter
    # дёҚеңЁжӯӨи®ҫзҪ® cmd_vel_topic, йҒҝе…ҚдёҺ relay еҶІзӘҒдә§з”ҹеҸҢеҶҷ
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    odom_topic: /odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.35
      stateful: True

    # ---- RotationShimController еҢ…иЈ… MPPI ----
    # зӣ®ж ҮеңЁиә«еҗҺж—¶пјҡжЈҖжөӢжңәеҷЁдәәжңқеҗ‘дёҺи·Ҝеҫ„и§’еәҰе·®пјҢи¶…иҝҮ angular_dist_threshold е…ҲеҺҹең°ж—ӢиҪ¬еҜ№йҪҗпјҢеҶҚдәӨз»ҷ MPPI
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.785  # 45В°пјҡи§’еәҰе·® > 45В° ж—¶е…Ҳж—ӢиҪ¬пјҢзӣ®ж ҮеңЁиә«еҗҺеҝ…з„¶и§ҰеҸ‘
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.4   # дёҺ wz_max дёҖиҮҙ
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0
      time_steps: 16                    # 32вҶ’16: еҮҸеҚҠи®Ўз®—йҮҸпјҢйҖӮй…ҚдҪҺRTF
      model_dt: 0.1
      batch_size: 200                   # 800вҶ’200: 4x еҮҸе°‘йҮҮж ·йҮҸ
      vx_std: 0.2                       # еўһеӨ§йҮҮж ·ж ҮеҮҶе·®пјҢиЎҘеҒҝ batch_size еҮҸе°‘
      vy_std: 0.0
      wz_std: 0.4
      vx_max: 0.3
      vx_min: -0.1
      vy_max: 0.0
      wz_max: 0.4
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 1.0          # 0.5вҶ’1.0: дҪҺRTFдёӢTFжӣҙж…ўпјҢеўһеӨ§е®№еҝҚ
      temperature: 0.5
      gamma: 0.015
      motion_model: "DiffDrive"

      # еҠ йҖҹеәҰйҷҗеҲ¶
      ax_max: 2.0                       # 1.5вҶ’2.0: еҠ йҖҹжӣҙжҝҖиҝӣ
      ax_min: -2.0
      az_max: 2.0

      visualize: true

      # иҜ„еҲҶж ҮеҮҶ вҖ” дёҚз”Ё ObstacleCritic(жңүbug), з”Ё CostCritic жӣҝд»Ј
      critics: [
        "ConstraintCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PreferForwardCritic",
        "CostCritic"
      ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        cost_power: 1
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_weight: 14.0
        cost_power: 1
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PreferForwardCritic:
        enabled: true
        cost_weight: 2.0             # 8.0 вҶ’ 2.0пјҡShim е·ІеӨ„зҗҶеҲқе§Ӣж—ӢиҪ¬пјҢж— йңҖиҝҮејәйҷҗеҲ¶
        cost_power: 1
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        critical_cost: 300.0
        collision_cost: 1000000.0
        consider_footprint: false
        near_goal_distance: 0.5

# ==================== еұҖйғЁд»Јд»·ең°еӣҫ ====================
# VoxelLayer зӣҙжҺҘж¶Ҳиҙ№ FastLIO2 3D зӮ№дә‘, дҝқз•ҷй«ҳеәҰдҝЎжҒҜ
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.2
      transform_tolerance: 0.5   # е…Ғи®ёTFж—¶й—ҙжҲіеҒҸе·®пјҢйҳІжӯўзӮ№дә‘иў«дёўејғ

      plugins: ["voxel_layer", "denoise_layer", "inflation_layer"]

      # 3D дҪ“зҙ еұӮ: и®ўйҳ… FastLIO2 еҺ»з•ёеҸҳдҪ“зі»зӮ№дә‘
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True        # и°ғиҜ•ж—¶ејҖеҗҜ, RViz дёӯеҸҜзңӢ 3D дҪ“зҙ 
        origin_z: -1.4                 # MuJoCo: lidarеңЁodom Z=0, base_linkвүҲ-0.45m, ең°йқўвүҲ-1.25m
        z_resolution: 0.1
        z_voxels: 25                   # 25еұӮГ—0.1m=2.5mпјҢиҰҶзӣ–[-1.4m, 1.1m]пјҢдј ж„ҹеҷЁorigin ZвүҲ0.87mеңЁз•ҢеҶ…
        max_obstacle_height: 0.2       # 0.2m вүҲ ең°йқў(-1.25m)+1.45mйҡңзўҚзү©йЎ¶йғЁ
        min_obstacle_height: -1.0      # -1.0m вүҲ ең°йқў(-1.25m)+0.25mпјҢи·іиҝҮең°йқўеҷӘеЈ°
        mark_threshold: 2              # # дҪ“зҙ еҲ—дёӯиҮіе°‘ 2 дёӘзӮ№жүҚж Үи®°йҡңзўҚпјҲеҚ•дёӘж•Је°„еҷӘзӮ№дёҚеҶҚи§ҰеҸ‘пјү
        unknown_threshold: 15
        combination_method: 1          # 1=overwrite, жҜҸж¬Ўжӣҙж–°зӣҙжҺҘиҰҶзӣ–иҖҢйқһзҙҜз§Ҝ
        # ж Үи®°е’Ңжё…йҷӨеҲҶзҰ»пјҡйҳІжӯўзӣІеҢәеҶ… raytrace жё…йҷӨе·Іж Үи®°зҡ„иҝ‘и·қзҰ»йҡңзўҚдҪ“зҙ 
        # cloud_mark : д»…ж Үи®°пјҢд»Һ 0.3m иө·пјҲMid360 зү©зҗҶзӣІеҢәиҫ№з•Ңпјү
        # cloud_clear: д»…жё…йҷӨпјҢд»Һ 0.8m иө·пјҲжңәеҷЁдәәиҙҙиҝ‘йҡңзўҚж—¶дёҚжё…йҷӨдҪ“зҙ пјҢйҳІжӯў"йҒ—еҝҳ"пјү
        observation_sources: cloud_mark cloud_clear
        cloud_mark:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 0.2
          min_obstacle_height: -1.0
          clearing: False
          marking: True
          obstacle_max_range: 5.0
          obstacle_min_range: 0.3
        cloud_clear:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 0.2
          min_obstacle_height: -1.0
          clearing: True
          marking: False
          raytrace_max_range: 6.0
          raytrace_min_range: 0.8     # д»…еңЁ 0.8m д»ҘеӨ–жү§иЎҢжё…йҷӨпјҢзӣІеҢәеҶ…дёҚжё…йҷӨ

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 3          # й»ҳи®ӨеҖј
        group_connectivity_type: 8     # й»ҳи®ӨеҖјпјҢжҺЁиҚҗ

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.7         # 0.6 вҶ’ 0.7пјҡеўһеӨ§иҶЁиғҖеҚҠеҫ„пјҢдҪҝжңәеҷЁдәәиҝңзҰ»й«ҳйҡңзўҚзү©зӣІеҢәиҫ№зјҳ

# ==================== е…ЁеұҖд»Јд»·ең°еӣҫ ====================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.2
      resolution: 0.05
      track_unknown_space: false
      transform_tolerance: 0.5   # е…Ғи®ёTFж—¶й—ҙжҲіеҒҸе·®пјҢйҳІжӯўзӮ№дә‘иў«дёўејғ

      plugins: ["static_layer", "inflation_layer"]  # "voxel_layer", 

      # йқҷжҖҒең°еӣҫеұӮ (mujoco.yaml: FAST_LIO2 е»әеӣҫеҗҺз”Ё octomap/pcd2pgm иҪ¬жҚў)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # 3D дҪ“зҙ еұӮ: е®һж—¶йҡңзўҚзү©жЈҖжөӢ
      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True
      #   publish_voxel_map: False
      #   origin_z: -1.4
      #   z_resolution: 0.1
      #   z_voxels: 25   # 25еұӮГ—0.1m=2.5mпјҢиҰҶзӣ–[-1.4m, 1.1m]пјҢдј ж„ҹеҷЁorigin ZвүҲ0.87mеңЁз•ҢеҶ…
      #   max_obstacle_height: 0.2   # ең°йқў(-1.25m)+1.45mйҡңзўҚзү©
      #   min_obstacle_height: -0.9  # ең°йқў(-1.25m)+0.25mпјҢи·іиҝҮең°йқўеҷӘеЈ°
      #   mark_threshold: 2
      #   unknown_threshold: 15
      #   combination_method: 1  ##
      #   observation_sources: pointcloud
      #   pointcloud:
      #     topic: /cloud_registered_body
      #     data_type: "PointCloud2"
      #     max_obstacle_height: 0.2
      #     min_obstacle_height: -0.9
      #     clearing: True
      #     marking: True
      #     obstacle_max_range: 8.0
      #     obstacle_min_range: 0.3
      #     raytrace_max_range: 10.0
      #     raytrace_min_range: 0.3

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# --- ең°еӣҫжңҚеҠЎеҷЁ ---
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "mujoco_car.yaml"         # FAST_LIO2 е»әеӣҫеҗҺиҪ¬жҚўзҡ„ 2D ж …ж јең°еӣҫ

# --- е…ЁеұҖи§„еҲ’еҷЁ ---
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
