# ============================================================================
# Nav2 参数 — 人形机器人真机导航 (X1 + Mid360 + car_30 建图)
# ============================================================================
# 传感器: /cloud_registered_body (FastLIO2, PointCloud2, body系)
# TF 链: map -> odom -> base_footprint  (odom由odom_bridge提供, map由ICP提供)
# 里程计: /odom (odom_bridge 转发, 含速度)
# 全局地图: school_room_30.yaml (小车0.30m雷达建图)
# 定位: open3d_loc ICP 实时发布 map->odom TF
# 坐标系: ICP实测 map->camera_init Z≈0.92m
#   body在odom Z≈+0.92m  地面在odom Z≈-0.39m
# 注意: ObstacleCritic 有 bug, 用 CostCritic 替代
# ============================================================================

# --- AMCL (未启用, 由 open3d_loc ICP 动态发布 map->odom 代替) ---
amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "/scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    tf_broadcast: False

# --- 行为树导航器 ---
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

# --- 控制器服务器 (MPPI) ---
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    odom_topic: /odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 20.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.35
      stateful: True

    # ---- MPPI 控制器 (人形机器人适度降速) ----
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 32
      model_dt: 0.1
      batch_size: 800
      vx_std: 0.15
      vy_std: 0.0
      wz_std: 0.3
      vx_max: 0.5
      vx_min: -0.2
      vy_max: 0.0
      wz_max: 1.2
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.5
      temperature: 0.5
      gamma: 0.015
      motion_model: "DiffDrive"

      ax_max: 1.5
      ax_min: -1.5
      az_max: 2.0

      visualize: true

      critics: [
        "ConstraintCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PreferForwardCritic",
        "CostCritic"
      ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        cost_power: 1
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_weight: 14.0
        cost_power: 1
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PreferForwardCritic:
        enabled: true
        cost_weight: 8.0
        cost_power: 1
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        critical_cost: 300.0
        collision_cost: 1000000.0
        consider_footprint: false
        near_goal_distance: 0.5

# ==================== 局部代价地图 ====================
# VoxelLayer 直接消费 FastLIO2 3D 点云, 保留高度信息
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.2
      transform_tolerance: 0.5

      plugins: ["voxel_layer", "inflation_layer"]

      # 3D 体素层: 订阅 FastLIO2 去畸变体系点云
      # 小车建图坐标系: ICP Z=0.92m → body在odom Z≈+0.92m → 地面≈-0.39m
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False       # 实机关闭以节省资源
        origin_z: -0.50
        z_resolution: 0.1
        z_voxels: 16
        max_obstacle_height: 1.10
        min_obstacle_height: -0.29
        mark_threshold: 1
        unknown_threshold: 15
        combination_method: 1
        observation_sources: pointcloud
        pointcloud:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 1.10
          min_obstacle_height: -0.29
          clearing: True
          marking: True
          obstacle_max_range: 5.0
          obstacle_min_range: 0.3
          raytrace_max_range: 6.0
          raytrace_min_range: 0.3

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.6

# ==================== 全局代价地图 ====================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      robot_radius: 0.2
      resolution: 0.05
      track_unknown_space: false
      transform_tolerance: 0.5

      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: -0.50
        z_resolution: 0.1
        z_voxels: 16
        max_obstacle_height: 1.10
        min_obstacle_height: -0.29
        mark_threshold: 1
        unknown_threshold: 15
        combination_method: 1
        observation_sources: pointcloud
        pointcloud:
          topic: /cloud_registered_body
          data_type: "PointCloud2"
          max_obstacle_height: 1.10
          min_obstacle_height: -0.29
          clearing: True
          marking: True
          obstacle_max_range: 8.0
          obstacle_min_range: 0.3
          raytrace_max_range: 10.0
          raytrace_min_range: 0.3

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# --- 地图服务器 ---
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""   # 由 navigation_real.launch.py 通过 launch argument 传入

# --- 全局规划器 ---
planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
